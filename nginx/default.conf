server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ============================================================
    # Security Headers (OWASP recommendations)
    # ============================================================

    # HSTS — prevent SSL stripping (Nessus CVSS 6.5 finding)
    # Note: no preload initially — add after verifying all subdomains
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;

    # Referrer privacy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restrict browser APIs
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Content Security Policy
    # - No 'unsafe-inline' needed: no inline styles or scripts
    # - connect-src: blog RSS feed
    # - img-src https:: social media crawlers for og:image
    # - frame-src 'none': Streamlit links are <a>, not <iframe>
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://blog.sprintjudicial.com; img-src 'self' data: https:; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;

    # ============================================================
    # Performance
    # ============================================================

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Static assets caching (logos, fonts, images)
    location ~* \.(ico|svg|png|jpg|jpeg|webp|gif|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";

        # Re-add security headers (nginx add_header in location blocks
        # overrides parent — must repeat)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
    }

    # CSS/JS caching (shorter TTL for easier updates)
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
    }

    # ============================================================
    # Routing
    # ============================================================

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files (except .well-known)
    location ~ /\.(?!well-known) {
        deny all;
    }
}
